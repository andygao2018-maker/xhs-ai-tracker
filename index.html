  :root {
    --bg: #f8f9fb;

    --border: #e8eaed;
    --border-light: #f1f3f5;
    --text-primary: #1a1d21;
    --text-secondary: #5f6368;
    --text-muted: #9aa0a6;
    --green: #1e8e3e;
    --green-bg: #e6f4ea;
    --blue: #1a73e8;
    --blue-bg: #e8f0fe;
    --amber: #e37400;
    --amber-bg: #fef7e0;
    --amber-bg-row: #fffdf6;
    --red: #d93025;
    --red-bg: #fce8e6;
    --gray: #80868b;
    --gray-bg: #f1f3f4;
    --purple: #7c3aed;
    --purple-bg: #f3e8ff;
    --done-row: #f9fafb;
    --radius: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }

  .header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 20px 28px 16px;
    position: sticky; top: 0; z-index: 100;
  }
  .header-top { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
  .header h1 { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
  .header .updated { font-size: 12px; color: var(--text-muted); }

  .stats { display: flex; gap: 6px; margin-top: 12px; flex-wrap: wrap; }
  .stat {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px; border-radius: 12px;
    font-size: 12px; font-weight: 500;
  }
  .stat .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .stat-done { background: var(--green-bg); color: var(--green); }
  .stat-done .dot { background: var(--green); }
  .stat-wip { background: var(--blue-bg); color: var(--blue); }
  .stat-wip .dot { background: var(--blue); }
  .stat-todo { background: var(--gray-bg); color: var(--text-secondary); }
  .stat-todo .dot { background: var(--gray); }
  .stat-new { background: var(--amber-bg); color: var(--amber); }
  .stat-new .dot { background: var(--amber); }

  .filters { display: flex; gap: 20px; margin-top: 12px; flex-wrap: wrap; }
  .filter-group { display: flex; align-items: center; gap: 4px; }
  .filter-label { font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-right: 4px; }
  .fbtn {
    padding: 3px 10px; border-radius: 6px; border: 1px solid transparent;
    background: transparent; font-size: 12px; font-weight: 500;
    cursor: pointer; color: var(--text-secondary); transition: all 0.12s;
  }
  .fbtn:hover { background: var(--gray-bg); }
  .fbtn.active { background: var(--text-primary); color: #fff; }

  .content { max-width: 1200px; margin: 0 auto; padding: 16px 20px 48px; }

  .section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 12px;
    overflow: hidden;
  }
  .sec-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; cursor: pointer; user-select: none;
  }
  .sec-head:hover { background: #fafbfc; }
  .sec-head h2 { font-size: 13px; font-weight: 700; letter-spacing: -0.2px; }
  .sec-head .cnt {
    font-size: 11px; font-weight: 500; color: var(--text-muted);
    background: var(--gray-bg); padding: 1px 8px; border-radius: 10px;
  }
  .sec-head .arrow { font-size: 10px; color: var(--text-muted); transition: transform 0.2s; margin-left: 8px; }
  .sec-head.collapsed .arrow { transform: rotate(-90deg); }
  .sec-body { border-top: 1px solid var(--border-light); }
  .sec-head.collapsed + .sec-body { display: none; }

  .t { width: 100%; border-collapse: collapse; }
  .t th {
    padding: 7px 12px; text-align: left;
    font-size: 11px; font-weight: 600; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.4px;
    background: #fafbfc; border-bottom: 1px solid var(--border-light);
    white-space: nowrap;
  }
  .t td {
    padding: 9px 12px; border-bottom: 1px solid var(--border-light);
    font-size: 12.5px; vertical-align: top;
  }
  .t tbody tr:last-child td { border-bottom: none; }

  .grp td {
    font-size: 12px; font-weight: 600; color: var(--text-secondary);
    padding: 7px 12px; background: #f8f9fb;
    letter-spacing: -0.1px;
  }

  .t .item td:first-child { padding-left: 24px; }
  .item { transition: background 0.1s; }
  .item:hover { background: #f8f9fb; }

  .item.s-done { box-shadow: inset 3px 0 0 var(--green); }
  .item.s-wip { box-shadow: inset 3px 0 0 var(--blue); }
  .item.s-todo { box-shadow: inset 3px 0 0 var(--border); }
  .item.s-low { box-shadow: inset 3px 0 0 var(--text-muted); }
  .item.s-confirmed { box-shadow: inset 3px 0 0 var(--purple); }
  .item.s-delayed { box-shadow: inset 3px 0 0 var(--red); }

  .item.s-done, .item.s-confirmed {
    background: var(--done-row);
  }
  .item.s-done td, .item.s-confirmed td {
    color: var(--text-muted);
  }
  .item.s-done .item-name, .item.s-confirmed .item-name {
    color: var(--text-secondary);
  }
  .item.s-done:hover, .item.s-confirmed:hover {
    background: #f3f4f6;
  }

  .item.is-new { background: var(--amber-bg-row); }
  .item.is-new:hover { background: #fff9eb; }
  .item.is-new td { color: var(--text-primary); }
  .item.is-new .item-name { color: var(--text-primary); }

  .badge {
    display: inline-block; padding: 2px 7px; border-radius: 4px;
    font-size: 11px; font-weight: 600; white-space: nowrap;
    line-height: 1.4;
  }
  .b-done { background: var(--green-bg); color: var(--green); }
  .b-wip { background: var(--blue-bg); color: var(--blue); }
  .b-todo { background: var(--gray-bg); color: var(--text-secondary); }
  .b-low { background: var(--gray-bg); color: var(--text-muted); }
  .b-confirmed { background: var(--purple-bg); color: var(--purple); }
  .b-delayed { background: var(--red-bg); color: var(--red); }

  .owner {
    display: inline-block; padding: 2px 7px; border-radius: 4px;
    font-size: 11px; font-weight: 500; white-space: nowrap;
  }
  .o-tech { background: #e8f0fe; color: #174ea6; }
  .o-mkt { background: #fce8e6; color: #c5221f; }
  .o-both { background: #f3e8ff; color: #7c3aed; }
  .o-taz { background: var(--amber-bg); color: #b45309; }
  .o-wangzai { background: #e0f2fe; color: #0369a1; }
  .o-all { background: var(--gray-bg); color: var(--text-secondary); }

  .item-name { color: var(--text-primary); font-weight: 500; }
  .progress { color: var(--text-secondary); line-height: 1.5; }
  .progress strong { color: var(--text-primary); font-weight: 600; }
  .date { font-size: 12px; color: var(--text-muted); white-space: nowrap; }

  .upd-tag {
    display: inline-block; padding: 1px 6px; border-radius: 3px;
    font-size: 10px; font-weight: 500; white-space: nowrap; line-height: 1.5;
  }
  .upd-new { background: #fef3c7; color: #92400e; }
  .upd-mod { background: #e0f2fe; color: #075985; }

  .empty-msg { padding: 20px 16px; color: var(--text-muted); font-size: 12px; }

  @media (max-width: 800px) {
    .header { padding: 14px 16px 12px; }
    .content { padding: 10px 8px 40px; }
    .t th, .t td { padding: 6px 8px; font-size: 11.5px; }
    .t .item td:first-child { padding-left: 16px; }
    .filters { gap: 10px; }
  }
</style>

const bcls = { done:'b-done', wip:'b-wip', todo:'b-todo', low:'b-low', confirmed:'b-confirmed', delayed:'b-delayed' };
const ocls = { tech:'o-tech', mkt:'o-mkt', both:'o-both', taz:'o-taz', wangzai:'o-wangzai', team:'o-all' };

let fStatus = 'all', fOwner = 'all';

function allItems() { const a=[]; D.forEach(s=>s.groups.forEach(g=>g.items.forEach(i=>a.push(i)))); return a; }

function stats() {
  const a = allItems();
  const done = a.filter(i=>i.st==='done'||i.st==='confirmed').length;
  const wip = a.filter(i=>i.st==='wip'||i.st==='delayed').length;
  const todo = a.filter(i=>i.st==='todo'||i.st==='low').length;
  const nw = a.filter(i=>i.nw).length;
  document.getElementById('statsBar').innerHTML =
    `<span class="stat stat-done"><span class="dot"></span>已完成 ${done}</span>`+
    `<span class="stat stat-wip"><span class="dot"></span>进行中 ${wip}</span>`+
    `<span class="stat stat-todo"><span class="dot"></span>待办 ${todo}</span>`+
    `<span class="stat stat-new"><span class="dot"></span>最新更新 ${nw}</span>`;
}

function vis(i) {
  if (fStatus==='todo' && (i.st==='done'||i.st==='confirmed')) return false;
  if (fStatus==='new' && !i.nw) return false;
  if (fOwner!=='all' && i.ot!==fOwner) return false;
  return true;
}

function render() {
  stats();
  const el = document.getElementById('app');
  el.innerHTML = '';
  D.forEach(sec => {
    const div = document.createElement('div'); div.className='section';
    const totalVisible = sec.groups.reduce((c,g)=>c+g.items.filter(vis).length,0);
    const hd = document.createElement('div'); hd.className='sec-head';
    hd.innerHTML = `<div style="display:flex;align-items:center;gap:8px"><h2>${sec.section}</h2><span class="cnt">${totalVisible}</span></div><span class="arrow">&#9660;</span>`;
    hd.onclick = () => { hd.classList.toggle('collapsed'); const b=hd.nextElementSibling; b.style.display=hd.classList.contains('collapsed')?'none':''; };
    const bd = document.createElement('div'); bd.className='sec-body';
    if (!totalVisible) { bd.innerHTML='<div class="empty-msg">无匹配项</div>'; }
    else {
      const tb = document.createElement('table'); tb.className='t';
      tb.innerHTML='<thead><tr><th style="width:24%">事项</th><th style="width:9%">负责人</th><th style="width:7%">状态</th><th style="width:40%">进展</th><th style="width:9%">目标</th><th style="width:11%">更新</th></tr></thead>';
      const tbody = document.createElement('tbody');
      sec.groups.forEach(g => {
        const vi = g.items.filter(vis);
        if (!vi.length) return;
        const gr = document.createElement('tr'); gr.className='grp';
        gr.innerHTML=`<td colspan="6">${g.name}</td>`;
        tbody.appendChild(gr);
        vi.forEach(i => {
          const tr = document.createElement('tr');
          tr.className = `item s-${i.st}${i.nw?' is-new':''}`;
          const updHtml = i.upd ? (() => {
            const isNew = i.upd.includes('新增') || i.upd.includes('移入');
            return `<span class="upd-tag ${isNew?'upd-new':'upd-mod'}">${i.upd}</span>`;
          })() : '<span style="color:var(--text-muted);font-size:11px">—</span>';
          tr.innerHTML =
            `<td class="item-name">${i.n}</td>`+
            `<td><span class="owner ${ocls[i.ot]||''}">${i.o}</span></td>`+
            `<td><span class="badge ${bcls[i.st]||'b-todo'}">${i.s}</span></td>`+
            `<td class="progress">${i.p}</td>`+
            `<td class="date">${i.d}</td>`+
            `<td>${updHtml}</td>`;
          tbody.appendChild(tr);
        });
      });
      tb.appendChild(tbody); bd.appendChild(tb);
    }
    div.appendChild(hd); div.appendChild(bd); el.appendChild(div);
  });
}

document.querySelectorAll('.fbtn').forEach(b => {
  b.onclick = () => {
    const f=b.dataset.f, v=b.dataset.v;
    document.querySelectorAll(`.fbtn[data-f="${f}"]`).forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    if(f==='status') fStatus=v; else fOwner=v;
    render();
  };
});

render();
